specVersion: "3.1"
metadata:
  name: demo.manageauthors
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: webide-extension-task-updateManifestJson
      afterTask: replaceVersion
      configuration:
        appFolder: webapp
        destDir: dist
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: demomanageauthors
        includeDependencies:
          - ui5-cc-spreadsheetimporter-v1-7-4        
        additionalFiles:
          - xs-app.json
  resources:
    excludes:
      - /test/**
      - /localService/**
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
